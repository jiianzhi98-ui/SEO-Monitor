name: Baidu Index Crawl

on:
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Trigger baidu index crawl (one site at a time)
        run: |
          BASE_URL="https://seo-monitor-iota.vercel.app"

          echo "Fetching site list..."
          DOMAINS=$(curl -sf "$BASE_URL/api/sites/domains" | jq -r '.[]')

          for domain in $DOMAINS; do
            echo "=== Baidu index for $domain ==="
            curl -f -s \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "$BASE_URL/api/cron/baidu-index?site=$domain" \
              | jq .
            echo "Waiting 30s before next site..."
            sleep 30
          done
          echo "=== Done ==="
