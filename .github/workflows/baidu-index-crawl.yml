name: Baidu Index Crawl (Puppeteer)

on:
  workflow_dispatch:
    inputs:
      domain:
        description: '只抓某个域名（留空 = 全部站点）'
        required: false
        default: ''
  schedule:
    # 00:00 UTC = 08:00 Malaysia — runs after daily-crawl finishes
    - cron: '0 0 * * *'

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install scraper dependencies
        run: cd scripts && npm install

      - name: Run Baidu index scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          DOMAIN="${{ github.event.inputs.domain }}"
          if [ -n "$DOMAIN" ]; then
            echo "Scraping single domain: $DOMAIN"
            node scripts/baidu-index.mjs "$DOMAIN"
          else
            echo "Scraping all enabled sites"
            node scripts/baidu-index.mjs
          fi
