name: Daily SEO Crawl

on:
  schedule:
    - cron: '0 18 * * *'   # 02:00 Malaysia (UTC+8) — 关键词抓取
    - cron: '0 20 * * *'   # 04:00 Malaysia (UTC+8) — 排名变动
    - cron: '0 22 * * *'   # 06:00 Malaysia (UTC+8) — 权重 + 收录
  workflow_dispatch:
    inputs:
      step:
        description: '抓取步骤'
        type: choice
        options: [all, keywords, rank, weight]
        default: all

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      BASE_URL: https://seo-monitor-iota.vercel.app

    steps:
      - name: Determine step
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            STEP="${{ github.event.inputs.step }}"
          elif [ "${{ github.event.schedule }}" = "0 18 * * *" ]; then
            STEP="keywords"
          elif [ "${{ github.event.schedule }}" = "0 20 * * *" ]; then
            STEP="rank"
          else
            STEP="weight"
          fi
          echo "step=$STEP" >> $GITHUB_OUTPUT
          echo "Running step: $STEP"

      - name: Fetch site list
        id: sites
        run: |
          DOMAINS=$(curl -sf "$BASE_URL/api/sites/domains" | jq -r '.[]')
          echo "domains<<EOF" >> $GITHUB_OUTPUT
          echo "$DOMAINS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Keywords — per site
        if: steps.vars.outputs.step == 'keywords' || steps.vars.outputs.step == 'all'
        run: |
          echo "${{ steps.sites.outputs.domains }}" | while read domain; do
            [ -z "$domain" ] && continue
            echo "=== Keywords: $domain ==="
            curl -f -s \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "$BASE_URL/api/cron?site=$domain&step=keywords" | jq .
          done

      - name: Rank changes — per site
        if: steps.vars.outputs.step == 'rank' || steps.vars.outputs.step == 'all'
        run: |
          echo "${{ steps.sites.outputs.domains }}" | while read domain; do
            [ -z "$domain" ] && continue
            echo "=== Rank: $domain ==="
            curl -f -s \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "$BASE_URL/api/cron?site=$domain&step=rank" | jq .
          done

      - name: Weight + index — per site
        if: steps.vars.outputs.step == 'weight' || steps.vars.outputs.step == 'all'
        run: |
          echo "${{ steps.sites.outputs.domains }}" | while read domain; do
            [ -z "$domain" ] && continue
            echo "=== Weight: $domain ==="
            curl -f -s \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "$BASE_URL/api/cron?site=$domain&step=weight" | jq .
          done
