name: Daily SEO Crawl

on:
  workflow_dispatch:
    inputs:
      step:
        description: '抓取步骤'
        type: choice
        options: [all, keywords, rank, weight, index-pages, rank-title]
        default: all
      site:
        description: '单站域名（留空=全部站点，例如 y8l.com）'
        required: false
        default: ''
  schedule:
    - cron: '0 15 * * *'   # 23:00 MYT (target ~00:00 MYT after ~1h queue) — keywords
    - cron: '0 16 * * *'   # 00:00 MYT (target ~01:00 MYT after ~1h queue) — weight
    - cron: '0 17 * * *'   # 01:00 MYT (target ~02:00 MYT after ~1h queue) — rank
    - cron: '0 18 * * *'   # 02:00 MYT — rank-title
    - cron: '0 20 * * *'   # 04:00 MYT — index-pages

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      total: ${{ steps.gen.outputs.total }}
    steps:
      - name: Compute job matrix
        id: gen
        run: |
          SITE="${{ github.event.inputs.site }}"
          if [ -n "$SITE" ]; then
            # 单站运行：1 个 job 即可
            echo 'matrix={"group":[0]}' >> $GITHUB_OUTPUT
            echo 'total=1' >> $GITHUB_OUTPUT
            echo "Single-site run ($SITE) → 1 group"
          else
            # 根据 step 决定每组站点上限
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              STEP="${{ github.event.inputs.step }}"
            elif [ "${{ github.event.schedule }}" = "0 15 * * *" ]; then
              STEP="keywords"
            elif [ "${{ github.event.schedule }}" = "0 16 * * *" ]; then
              STEP="weight"
            elif [ "${{ github.event.schedule }}" = "0 17 * * *" ]; then
              STEP="rank"
            elif [ "${{ github.event.schedule }}" = "0 18 * * *" ]; then
              STEP="rank-title"
            elif [ "${{ github.event.schedule }}" = "0 20 * * *" ]; then
              STEP="index-pages"
            else
              STEP="all"
            fi
            case "$STEP" in
              keywords)    SPG=5 ;;
              rank)        SPG=4 ;;
              weight)      SPG=4 ;;
              index-pages) SPG=1 ;;
              rank-title)  SPG=2 ;;
              *)           SPG=4 ;;
            esac
            # rank-title 单独查询 has_rank_title=true 的站点；其余查询有任意抓取开关的站点
            if [ "$STEP" = "rank-title" ]; then
              COUNT=$(curl -sf \
                -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
                -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
                "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/sites?select=id&has_rank_title=eq.true" | \
                python3 -c "import json,sys; print(len(json.load(sys.stdin)))")
            else
              COUNT=$(curl -sf \
                -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
                -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
                "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/sites?select=id&or=(is_enabled.eq.true,has_rank_data.eq.true,has_index_pages.eq.true)" | \
                python3 -c "import json,sys; print(len(json.load(sys.stdin)))")
            fi
            TOTAL=$(python3 -c "import math; print(max(1, math.ceil(${COUNT}/${SPG})))")
            MATRIX=$(python3 -c "import json; print(json.dumps({'group': list(range(${TOTAL}))}))")
            echo "matrix=${MATRIX}" >> $GITHUB_OUTPUT
            echo "total=${TOTAL}" >> $GITHUB_OUTPUT
            echo "Step=${STEP} SPG=${SPG} Sites=${COUNT} → Groups=${TOTAL}"
          fi
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  crawl:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false          # 一组失败不影响其他组
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine step
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            STEP="${{ github.event.inputs.step }}"
          elif [ "${{ github.event.schedule }}" = "0 15 * * *" ]; then
            STEP="keywords"
          elif [ "${{ github.event.schedule }}" = "0 16 * * *" ]; then
            STEP="weight"
          elif [ "${{ github.event.schedule }}" = "0 17 * * *" ]; then
            STEP="rank"
          elif [ "${{ github.event.schedule }}" = "0 18 * * *" ]; then
            STEP="rank-title"
          elif [ "${{ github.event.schedule }}" = "0 20 * * *" ]; then
            STEP="index-pages"
          else
            STEP="all"
          fi
          echo "step=$STEP" >> $GITHUB_OUTPUT
          echo "Running step: $STEP (group ${{ matrix.group }}/${{ needs.setup.outputs.total }})"

      - name: Run crawl
        run: |
          SITE_ARG=""
          if [ -n "${{ github.event.inputs.site }}" ]; then
            SITE_ARG="--site=${{ github.event.inputs.site }}"
          fi
          if [ "${{ steps.vars.outputs.step }}" = "rank-title" ]; then
            npx tsx scripts/crawl-rank.ts --group=${{ matrix.group }} --total-groups=${{ needs.setup.outputs.total }}
          else
            npx tsx scripts/crawl.ts --step=${{ steps.vars.outputs.step }} --group=${{ matrix.group }} --total-groups=${{ needs.setup.outputs.total }} $SITE_ARG
          fi
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
