name: Daily SEO Crawl

on:
  workflow_dispatch:
    inputs:
      step:
        description: '抓取步骤'
        type: choice
        options: [all, keywords, rank, weight, index-pages]
        default: all
  schedule:
    - cron: '0 13 * * *'   # 21:00 MYT (target ~02:00 MYT after ~5h queue) — keywords
    - cron: '0 15 * * *'   # 23:00 MYT (target ~04:00 MYT after ~5h queue) — weight
    - cron: '0 16 * * *'   # 00:00 MYT (target ~05:00 MYT after ~5h queue) — rank
    - cron: '0 18 * * *'   # 02:00 MYT (target ~07:00 MYT after ~5h queue) — index-pages

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false          # 一组失败不影响其他组
      matrix:
        group: [0, 1, 2, 3, 4] # 5 个 job，各用不同 IP

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine step
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            STEP="${{ github.event.inputs.step }}"
          elif [ "${{ github.event.schedule }}" = "0 13 * * *" ]; then
            STEP="keywords"
          elif [ "${{ github.event.schedule }}" = "0 15 * * *" ]; then
            STEP="weight"
          elif [ "${{ github.event.schedule }}" = "0 16 * * *" ]; then
            STEP="rank"
          elif [ "${{ github.event.schedule }}" = "0 18 * * *" ]; then
            STEP="index-pages"
          else
            STEP="all"
          fi
          echo "step=$STEP" >> $GITHUB_OUTPUT
          echo "Running step: $STEP"

      - name: Run crawl
        run: npx tsx scripts/crawl.ts --step=${{ steps.vars.outputs.step }} --group=${{ matrix.group }} --total-groups=5
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
