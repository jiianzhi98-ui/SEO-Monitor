name: SEO Crawl Retry

on:
  workflow_dispatch:
    inputs:
      step:
        description: '重试步骤'
        type: choice
        options: [keywords, weight, rank, rank-title, index-pages]
        default: keywords
  schedule:
    - cron: '0 20 * * *'    # 04:00 MYT — keywords 重试
    - cron: '30 20 * * *'   # 04:30 MYT — weight 重试
    - cron: '0 21 * * *'    # 05:00 MYT — rank 重试
    - cron: '30 21 * * *'   # 05:30 MYT — rank-title 重试
    - cron: '0 22 * * *'    # 06:00 MYT — index-pages 重试

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      total: ${{ steps.gen.outputs.total }}
    steps:
      - name: Compute retry matrix (based on actual failed sites)
        id: gen
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            STEP="${{ github.event.inputs.step }}"
          elif [ "${{ github.event.schedule }}" = "0 20 * * *" ]; then
            STEP="keywords"
          elif [ "${{ github.event.schedule }}" = "30 20 * * *" ]; then
            STEP="weight"
          elif [ "${{ github.event.schedule }}" = "0 21 * * *" ]; then
            STEP="rank"
          elif [ "${{ github.event.schedule }}" = "30 21 * * *" ]; then
            STEP="rank-title"
          elif [ "${{ github.event.schedule }}" = "0 22 * * *" ]; then
            STEP="index-pages"
          else
            STEP="keywords"
          fi

          SB_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
          SB_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"

          # Today's date in MYT (UTC+8)
          TODAY=$(python3 -c "
          from datetime import datetime, timezone, timedelta
          now = datetime.now(timezone(timedelta(hours=8)))
          print(now.strftime('%Y-%m-%d'))
          ")
          TODAY_START="${TODAY}T00:00:00+08:00"
          TODAY_END="${TODAY}T23:59:59.999+08:00"

          # Step 1: Get today's activity IDs for this step
          ACTS=$(curl -sf \
            -H "apikey: ${SB_KEY}" \
            -H "Authorization: Bearer ${SB_KEY}" \
            "${SB_URL}/rest/v1/activity_log?select=id&step=eq.${STEP}&type=eq.cron_task&logged_at=gte.${TODAY_START}&logged_at=lte.${TODAY_END}")
          IDS=$(echo "$ACTS" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print(','.join(d['id'] for d in data))
          ")

          if [ -z "$IDS" ]; then
            echo "今日尚无 ${STEP} 主抓取记录，创建 1 个 no-op job"
            FAILED_COUNT=0
          else
            # Step 2: Count unique failed/empty domains
            SITE_LOGS=$(curl -sf \
              -H "apikey: ${SB_KEY}" \
              -H "Authorization: Bearer ${SB_KEY}" \
              "${SB_URL}/rest/v1/activity_site_log?select=domain&activity_id=in.(${IDS})&status=in.(fail,empty)")
            FAILED_COUNT=$(echo "$SITE_LOGS" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          domains = set(d['domain'] for d in data if d.get('domain'))
          print(len(domains))
            ")
          fi

          echo "Step=${STEP} 今日失败/空站: ${FAILED_COUNT}"

          # 1 job per failed site (max parallelism); fallback to 1 no-op job if none
          TOTAL=$(python3 -c "print(max(1, ${FAILED_COUNT}))")
          MATRIX=$(python3 -c "import json; print(json.dumps({'group': list(range(${TOTAL}))}))")
          echo "matrix=${MATRIX}" >> $GITHUB_OUTPUT
          echo "total=${TOTAL}" >> $GITHUB_OUTPUT
          echo "Groups=${TOTAL}"
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  retry:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine step
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            STEP="${{ github.event.inputs.step }}"
          elif [ "${{ github.event.schedule }}" = "0 20 * * *" ]; then
            STEP="keywords"
          elif [ "${{ github.event.schedule }}" = "30 20 * * *" ]; then
            STEP="weight"
          elif [ "${{ github.event.schedule }}" = "0 21 * * *" ]; then
            STEP="rank"
          elif [ "${{ github.event.schedule }}" = "30 21 * * *" ]; then
            STEP="rank-title"
          elif [ "${{ github.event.schedule }}" = "0 22 * * *" ]; then
            STEP="index-pages"
          else
            STEP="keywords"
          fi
          echo "step=$STEP" >> $GITHUB_OUTPUT
          echo "Retry step: $STEP (group ${{ matrix.group }}/${{ needs.setup.outputs.total }})"

      - name: Run retry crawl
        run: |
          if [ "${{ steps.vars.outputs.step }}" = "rank-title" ]; then
            npx tsx scripts/crawl-rank.ts --group=${{ matrix.group }} --total-groups=${{ needs.setup.outputs.total }} --retry-failed
          else
            npx tsx scripts/crawl.ts --step=${{ steps.vars.outputs.step }} --group=${{ matrix.group }} --total-groups=${{ needs.setup.outputs.total }} --retry-failed
          fi
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
