name: SEO Crawl Retry

on:
  workflow_dispatch:
    inputs:
      step:
        description: '重试步骤'
        type: choice
        options: [keywords, weight, rank]
        default: keywords
  schedule:
    - cron: '0 19 * * *'    # 03:00 MYT → 目标执行 08:00 MYT（+5h queue）— keywords 重试
    - cron: '30 19 * * *'   # 03:30 MYT → 目标执行 08:30 MYT（+5h queue）— weight 重试
    - cron: '0 20 * * *'    # 04:00 MYT → 目标执行 09:00 MYT（+5h queue）— rank 重试

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        group: [0, 1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine step
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            STEP="${{ github.event.inputs.step }}"
          elif [ "${{ github.event.schedule }}" = "0 19 * * *" ]; then
            STEP="keywords"
          elif [ "${{ github.event.schedule }}" = "30 19 * * *" ]; then
            STEP="weight"
          elif [ "${{ github.event.schedule }}" = "0 20 * * *" ]; then
            STEP="rank"
          else
            STEP="keywords"
          fi
          echo "step=$STEP" >> $GITHUB_OUTPUT
          echo "Retry step: $STEP (group ${{ matrix.group }})"

      - name: Run retry crawl
        run: npx tsx scripts/crawl.ts --step=${{ steps.vars.outputs.step }} --group=${{ matrix.group }} --total-groups=5 --retry-failed
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
