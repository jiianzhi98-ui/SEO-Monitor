name: Environment Daily Snapshot

on:
  schedule:
    - cron: '45 22 * * *'  # 06:45 MYT（所有抓取和重试完成后）
  workflow_dispatch:
    inputs:
      date:
        description: '目标日期 YYYY-MM-DD（留空=昨天）'
        required: false
        default: ''

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call daily-snapshot API
        env:
          DATE_INPUT: ${{ github.event.inputs.date }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          VERCEL_URL: ${{ secrets.NEXT_PUBLIC_VERCEL_URL }}
        run: |
          DATE_PARAM=""
          if [ -n "$DATE_INPUT" ]; then
            DATE_PARAM="?date=$DATE_INPUT"
          fi
          RESPONSE=$(curl -sf \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$VERCEL_URL/api/environment/daily-snapshot${DATE_PARAM}")
          echo "$RESPONSE"
          SUCCESS=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('success',''))")
          if [ "$SUCCESS" = "True" ]; then
            echo "Snapshot saved successfully"
          else
            echo "ERROR: API returned failure"
            exit 1
          fi
